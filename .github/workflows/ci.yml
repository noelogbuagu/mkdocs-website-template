# Build and publish the MkDocs site to GitHub Pages on every push to main.
# Uses mkdocs gh-deploy, which pushes the built site to the gh-pages branch.
name: ci
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      # Social cards (imaging extra) need Cairo and related system libraries.
      - name: Install imaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libzlib-dev pngquant
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: ~/.cache
          restore-keys: |
            mkdocs-material-
      # imaging extra matches local pyproject.toml and enables social plugin cards.
      - run: pip install "mkdocs-material[imaging]"
      - run: mkdocs gh-deploy --force
