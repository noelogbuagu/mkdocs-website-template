site_name: Plurobi
site_description: Data and AI automation for SMEs. Plurobi builds AI systems that remove manual reporting, scattered spreadsheets, and repetitive operations.
site_url: https://yourdomain.com

nav:
  - Home: index.md
  - Case Studies:
    - Overview: portfolio/index.md
    - Projects:
      - portfolio/projects/project-1.md
      - portfolio/projects/project-2.md
  - Blog:
    - blog/index.md

theme:
  name: material
  # Custom templates live in overrides/ (see overrides/home.html for the landing page shell)
  custom_dir: overrides
  features:
    - search.suggest
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.tooltips
    - content.tabs.link
    - content.code.copy
    - navigation.footer
  language: en
  # Single dark scheme to match the Plurobi brand board (black background, orange accent)
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Open Sans
    code: Roboto Mono
  logo: assets/plurobi-mark.png
  favicon: assets/plurobi-mark.png

extra:
  generator: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com
    - icon: fontawesome/solid/paper-plane
      link: mailto:hello@plurobi.com
  # Central place for call-to-action links used across the landing page
  contact_url: https://calendly.com/obiogbuagu/free-ai-strategy-consultation
  analytics:
    # provider: google
    # property: G-XXXXXXimport

extra_css:
  - stylesheets/extra.css
  - stylesheets/hero.css

plugins:
  - search
  # Social cards need Cairo (imaging deps). Enabled automatically in CI where
  # those libraries are present; disabled for local builds to avoid crashes.
  - social:
      enabled: !ENV [CI, false]
      cards_layout_options:
        background_color: "#000000"
        color: "#ffffff"
  - blog:
      blog_dir: blog
      authors_file: "{blog}/.authors.yml"
      categories: true

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - pymdownx.keys

copyright: |
  &copy; 2026 Plurobi. Data and AI automation for SMEs.
