site_name: Plurobi
site_description: Data and AI automation for SMEs. Plurobi builds AI systems that remove manual reporting, scattered spreadsheets, and repetitive operations.
site_url: https://yourdomain.com

nav:
  - Home: index.md
  - Projects:
      - Overview: portfolio/index.md
      - Automated Repeat Revenue Engine: portfolio/projects/automated-repeat-revenue-engine.md
      - Product Launch Profitability System: portfolio/projects/product-launch-profitability-system.md
      - Marketing Attribution Engine: portfolio/projects/marketing-attribution-engine.md
      - Operations Control Tower: portfolio/projects/operations-control-tower.md
      - Survey Intelligence Platform: portfolio/projects/survey-intelligence-platform.md
      - Customer Contact Intelligence: portfolio/projects/customer-contact-intelligence.md
  - Blog:
      - blog/index.md

theme:
  name: material
  # Custom templates live in overrides/ (see overrides/home.html for the landing page shell)
  custom_dir: overrides
  features:
    - search.suggest
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - content.tooltips
    - content.tabs.link
    - content.code.copy
    - navigation.footer
  language: en
  palette:
    # Dark mode (default — matches the Plurobi brand board)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    # Light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Open Sans
    code: Roboto Mono
  # Header logo swap lives in overrides/partials/logo.html (lockup dark/light).
  # This path still gates the partial's {% if config.theme.logo %} branch.
  logo: assets/plurobi-lockup-dark.png
  favicon: assets/plurobi-mark.png

extra:
  generator: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com
    - icon: fontawesome/solid/paper-plane
      link: mailto:hello@plurobi.com
  # Central place for call-to-action links used across the landing page
  contact_url: https://calendly.com/obiogbuagu/free-ai-strategy-consultation
  analytics:
    # provider: google
    # property: G-XXXXXXimport

extra_css:
  - stylesheets/extra.css
  - stylesheets/hero.css
  - stylesheets/mermaid.css

extra_javascript:
  - https://unpkg.com/mermaid@11.4.1/dist/mermaid.min.js
  - javascripts/mermaid.js

# mkdocs serve only watches docs/ by default. Theme templates in overrides/
# (e.g. home.html) need an explicit watch entry for live reload.
watch:
  - overrides
  - includes

plugins:
  - search
  # Social cards need Cairo (imaging deps). Enabled automatically in CI where
  # those libraries are present; disabled for local builds to avoid crashes.
  - social:
      enabled: !ENV [CI, false]
      cards_layout_options:
        background_color: "#000000"
        color: "#ffffff"
  - blog:
      blog_dir: blog
      authors_file: "{blog}/.authors.yml"
      categories: true

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      # Lets pages pull in shared content (e.g. the CTA card) with
      # --8<-- "filename.md" instead of duplicating it on every page.
      # Path is outside docs/ so MkDocs doesn't also build these as pages.
      base_path: [includes]
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - pymdownx.keys

copyright: |
  &copy; 2026 Plurobi. Data and AI automation for SMEs.