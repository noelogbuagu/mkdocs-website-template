{#-
  Header / drawer logo — same lockups as the homepage brand.
  Dark lockup on slate; light lockup on default (light mode).
-#}
{% if config.theme.logo %}
  <img class="md-logo__mark md-logo__mark--dark" src="{{ 'assets/plurobi-lockup-dark.png' | url }}" alt="logo">
  <img class="md-logo__mark md-logo__mark--light" src="{{ 'assets/plurobi-lockup-light.png' | url }}" alt="logo">
{% else %}
  {% set icon = config.theme.icon.logo or "material/library" %}
  {% include ".icons/" ~ icon ~ ".svg" %}
{% endif %}
